<head>

    <!-- 使用 Tailwind CSS 輕量化樣式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0b1119; margin: 0; overflow: hidden; }
        .muscle-list, .kinesiology-list { scrollbar-width: thin; scrollbar-color: #4b5563 #1e2937; }
        .muscle-list::-webkit-scrollbar, .kinesiology-list::-webkit-scrollbar { width: 6px; }
        .muscle-list::-webkit-scrollbar-track, .kinesiology-list::-webkit-scrollbar-track { background: #1e2937; }
        .muscle-list::-webkit-scrollbar-thumb, .kinesiology-list::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 12px; }
        .muscle-item { transition: all 0.1s ease; border-left: 2px solid transparent; }
        .muscle-item:hover { background: #26303f; border-left-color: #3b82f6; cursor: pointer; }
        .muscle-item.selected { background: #1e3a5f; border-left-color: #f97316; }
        details > summary { list-style: none; cursor: pointer; }
        details summary::-webkit-details-marker { display: none; }
        details[open] summary .chevron { transform: rotate(90deg); }
        .kinesiology details summary { font-weight: 600; color: #fcd34d; }
        .kinesiology .action-block { background: #1a2634; border-radius: 0.75rem; padding: 1rem; margin-bottom: 1rem; border-left: 4px solid #f97316; }
        .action-title { font-size: 1.1rem; font-weight: 700; color: #fbbf24; margin-bottom: 0.5rem; }
        .badge-okc { background: #0e7c5e; color: white; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-block; margin-right: 0.5rem; }
        .badge-ckc { background: #b4533b; color: white; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-block; margin-right: 0.5rem; }
        .muscle-tag { background: #2d3b4f; color: #b0c4de; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.7rem; display: inline-block; margin-right: 0.3rem; margin-bottom: 0.3rem; }
        #canvas-container { height: 100vh; width: 100%; background: #0b1119; display: block; }
        .label-card { background: rgba(0,0,0,0.7); color: white; padding: 4px 10px; border-radius: 24px; font-size: 14px; border: 1px solid #f97316; backdrop-filter: blur(4px); }
        /* 確保左側面板不遮擋畫布 */
        .h-screen { height: 100vh; }
    </style>
</head>
<body class="text-gray-200 antialiased overflow-hidden">
    <!-- 整體佈局: 左側面板(肌肉清單 + 功能解剖) + 右側3D畫布 -->
    <div class="flex h-screen">
        <!-- 左側可滾動面板 (1/3寬度) -->
        <div class="w-full md:w-1/3 lg:w-1/3 bg-[#1a222f] border-r border-gray-700/50 flex flex-col overflow-hidden shadow-2xl z-10">
            <!-- 標頭與搜尋 -->
            <div class="p-4 border-b border-gray-700 bg-[#1e2a3a] sticky top-0 z-20">
                <h1 class="text-xl font-bold text-orange-400 tracking-wide flex items-center gap-2">
                    <span class="text-2xl">🧬</span> 全身肌肉解剖 + 功能分析
                </h1>
                <input type="text" id="search-input" placeholder="搜尋肌肉 (例: 肱二頭肌)" class="mt-3 w-full bg-[#0f172a] border border-gray-600 rounded-lg px-4 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500/50" />
            </div>

            <!-- 兩部分內容: 肌肉清單 與 功能解剖 -->
            <div class="flex-1 overflow-y-auto muscle-list p-3 space-y-4" id="left-panel-content">
                <!-- 肌肉清單區塊 (折疊) -->
                <div class="bg-[#1f2b39] rounded-xl p-3">
                    <h2 class="text-orange-300 font-bold mb-2 flex items-center gap-1">💪 全身肌肉列表 <span class="text-xs text-gray-400">(點擊名稱高亮3D)</span></h2>
                    <div id="muscle-list-container" class="space-y-2 text-sm">
                        <!-- 由JS動態生成 -->
                        <div class="text-center py-10 text-gray-500">載入肌肉清單中...</div>
                    </div>
                </div>

                <!-- 功能解剖區塊 (開鏈/閉鏈/主動肌等) -->
                <div class="bg-[#1f2b39] rounded-xl p-4 kinesiology">
                    <h2 class="text-amber-300 font-bold text-lg mb-3 flex items-center gap-2">⚙️ 功能解剖 · 開鏈(OKC) / 閉鏈(CKC)</h2>
                    <div class="space-y-4" id="kinesiology-container">
                        <!-- 動態插入 -->
                    </div>
                </div>
            </div>

            <!-- 底部資訊 -->
            <div class="border-t border-gray-800 p-3 text-xs text-gray-500 bg-[#151e2a]">
                <span class="block">🖱️ 點擊肌肉名稱 → 3D部位高亮 (模型使用高對比色，確保可見)</span>
            </div>
        </div>

        <!-- 右側 3D 畫布區域 -->
        <div class="flex-1 relative bg-black" id="canvas-parent">
            <div id="canvas-container"></div>
            <!-- 控制提示 -->
            <div class="absolute bottom-4 left-4 bg-black/50 backdrop-blur-sm text-white text-xs px-3 py-2 rounded-full border border-gray-600 z-20">
                ⚡ 拖曳旋轉 · 滾輪縮放 · 點擊左側肌肉高亮
            </div>
            <!-- 當前選擇的肌肉名稱 -->
            <div id="selected-muscle-name" class="absolute top-4 left-4 bg-orange-600/90 text-white px-4 py-2 rounded-full text-sm font-medium z-20 shadow-lg border border-orange-300/30 hidden">
                🧬 <span id="selected-muscle-text">胸大肌</span>
            </div>
            <!-- 測試用提示：如果看到紅色方塊表示Three.js正常 -->
            <div class="absolute top-4 right-4 bg-green-600 text-white px-3 py-1 rounded-md text-xs z-20">3D渲染啟用中</div>
        </div>
    </div>

    <!-- 載入 Three.js 核心與輔助庫 (使用穩定CDN) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ----- 初始化 Three.js 場景、相機、渲染器 -----
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        console.log('Three.js 初始化開始');

        // 確保容器尺寸正確
        const container = document.getElementById('canvas-container');
        if (!container) {
            console.error('無法找到 canvas-container');
        }
        const width = container.clientWidth;
        const height = container.clientHeight;

        // 場景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b1119); // 深藍黑背景

        // 相機
        const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 1.5, 0);

        // WebGL渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(width, height);
        renderer.shadowMap.enabled = false; // 為了性能
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // CSS2渲染器 (用於標籤)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(width, height);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0';
        labelRenderer.domElement.style.left = '0';
        labelRenderer.domElement.style.pointerEvents = 'none';
        container.appendChild(labelRenderer.domElement);

        console.log('渲染器建立完畢');

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2;

        // ----- 添加強烈的燈光，確保模型可見 -----
        const ambientLight = new THREE.AmbientLight(0x404060); // 柔光
        scene.add(ambientLight);
        
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight1.position.set(2, 5, 5);
        scene.add(dirLight1);
        
        const dirLight2 = new THREE.DirectionalLight(0xffaa88, 0.8);
        dirLight2.position.set(-3, 2, 4);
        scene.add(dirLight2);
        
        const backLight = new THREE.PointLight(0x446688, 0.8);
        backLight.position.set(-2, 1, -5);
        scene.add(backLight);

        // 添加輔助網格和座標軸 (幫助確認空間)
        const gridHelper = new THREE.GridHelper(10, 20, 0x66aaff, 0x335588);
        gridHelper.position.y = -0.8;
        scene.add(gridHelper);

        // 添加一個簡單的紅色立方體作為參考 (如果看到它，證明渲染正常)
        const testCubeGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
        const testCubeMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x330000 });
        const testCube = new THREE.Mesh(testCubeGeo, testCubeMat);
        testCube.position.set(1.5, 1.0, 1.0);
        scene.add(testCube);
        console.log('測試立方體已加入場景');

        // 星星背景 (增加視覺趣味)
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 800;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 200;
            starPositions[i+1] = (Math.random() - 0.5) * 200;
            starPositions[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({color: 0x99aacc, size: 0.15});
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // ----- 建立簡化人體模型 (使用高飽和度顏色，確保可見) -----
        const bodyParts = new Map();
        const originalColors = new Map();

        function createPart(geometry, color, position, rotation = [0,0,0], scale = [1,1,1]) {
            const material = new THREE.MeshPhongMaterial({ color: color, shininess: 30, emissive: 0x000000 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(position[0], position[1], position[2]);
            mesh.rotation.set(rotation[0], rotation[1], rotation[2]);
            mesh.scale.set(scale[0], scale[1], scale[2]);
            mesh.castShadow = true;
            mesh.receiveShadow = false;
            return mesh;
        }

        // 頭部 (紅色)
        const head = createPart(new THREE.SphereGeometry(0.45, 32, 16), 0xff5555, [0, 2.2, 0]);
        scene.add(head); bodyParts.set('head', head);
        
        // 頸部 (橙色)
        const neck = createPart(new THREE.CylinderGeometry(0.3, 0.3, 0.4, 8), 0xffaa66, [0, 1.8, 0]);
        scene.add(neck); bodyParts.set('neck', neck);
        
        // 胸部 (黃色)
        const chest = createPart(new THREE.BoxGeometry(1.2, 0.9, 0.5), 0xffdd44, [0, 1.3, 0.1]);
        scene.add(chest); bodyParts.set('chest', chest);
        
        // 腹部 (淺綠色)
        const abdomen = createPart(new THREE.BoxGeometry(1.0, 0.8, 0.4), 0x88ff88, [0, 0.7, 0.1]);
        scene.add(abdomen); bodyParts.set('abdomen', abdomen);
        
        // 背部 (藍色)
        const back = createPart(new THREE.BoxGeometry(1.3, 1.8, 0.3), 0x4488ff, [0, 1.3, -0.3]);
        scene.add(back); bodyParts.set('back', back);
        
        // 左肩 (青色)
        const shoulderLeft = createPart(new THREE.SphereGeometry(0.35, 16), 0x33ccff, [-0.8, 1.5, 0.1]);
        scene.add(shoulderLeft); bodyParts.set('shoulder_left', shoulderLeft);
        
        // 右肩 (青色)
        const shoulderRight = createPart(new THREE.SphereGeometry(0.35, 16), 0x33ccff, [0.8, 1.5, 0.1]);
        scene.add(shoulderRight); bodyParts.set('shoulder_right', shoulderRight);
        
        // 左上臂前 (紫色)
        const armLeftFront = createPart(new THREE.CylinderGeometry(0.25, 0.25, 0.7, 8), 0xaa55ff, [-0.9, 1.0, 0.15], [0, 0, 0.2]);
        scene.add(armLeftFront); bodyParts.set('arm_left_front', armLeftFront);
        
        // 右上臂前 (紫色)
        const armRightFront = createPart(new THREE.CylinderGeometry(0.25, 0.25, 0.7, 8), 0xaa55ff, [0.9, 1.0, 0.15], [0, 0, -0.2]);
        scene.add(armRightFront); bodyParts.set('arm_right_front', armRightFront);
        
        // 左上臂後 (粉紅)
        const armLeftBack = createPart(new THREE.CylinderGeometry(0.23, 0.23, 0.65, 8), 0xff88aa, [-0.9, 1.0, -0.15], [0, 0, -0.1]);
        scene.add(armLeftBack); bodyParts.set('arm_left_back', armLeftBack);
        
        // 右上臂後 (粉紅)
        const armRightBack = createPart(new THREE.CylinderGeometry(0.23, 0.23, 0.65, 8), 0xff88aa, [0.9, 1.0, -0.15], [0, 0, 0.1]);
        scene.add(armRightBack); bodyParts.set('arm_right_back', armRightBack);
        
        // 左前臂 (淡紫)
        const forearmLeft = createPart(new THREE.CylinderGeometry(0.2, 0.16, 0.7, 6), 0xcc88ff, [-1.0, 0.45, 0.0], [0, 0, 0.1]);
        scene.add(forearmLeft); bodyParts.set('forearm_left', forearmLeft);
        
        // 右前臂 (淡紫)
        const forearmRight = createPart(new THREE.CylinderGeometry(0.2, 0.16, 0.7, 6), 0xcc88ff, [1.0, 0.45, 0.0], [0, 0, -0.1]);
        scene.add(forearmRight); bodyParts.set('forearm_right', forearmRight);
        
        // 左手 (肉色)
        const handLeft = createPart(new THREE.SphereGeometry(0.18, 6), 0xffccaa, [-1.1, 0.05, 0.05]);
        scene.add(handLeft); bodyParts.set('hand_left', handLeft);
        
        // 右手 (肉色)
        const handRight = createPart(new THREE.SphereGeometry(0.18, 6), 0xffccaa, [1.1, 0.05, 0.05]);
        scene.add(handRight); bodyParts.set('hand_right', handRight);
        
        // 臀部 (棕色)
        const glute = createPart(new THREE.BoxGeometry(1.2, 0.5, 0.6), 0xcc8844, [0, 0.4, -0.2]);
        scene.add(glute); bodyParts.set('glute', glute);
        
        // 左大腿前 (亮綠)
        const thighLeftFront = createPart(new THREE.CylinderGeometry(0.3, 0.25, 1.0, 8), 0x66ff66, [-0.5, -0.1, 0.1], [0, 0, 0.1]);
        scene.add(thighLeftFront); bodyParts.set('thigh_left_front', thighLeftFront);
        
        // 右大腿前 (亮綠)
        const thighRightFront = createPart(new THREE.CylinderGeometry(0.3, 0.25, 1.0, 8), 0x66ff66, [0.5, -0.1, 0.1], [0, 0, -0.1]);
        scene.add(thighRightFront); bodyParts.set('thigh_right_front', thighRightFront);
        
        // 左大腿後 (深綠)
        const thighLeftBack = createPart(new THREE.CylinderGeometry(0.3, 0.25, 1.0, 8), 0x33aa33, [-0.5, -0.1, -0.15], [0, 0, -0.05]);
        scene.add(thighLeftBack); bodyParts.set('thigh_left_back', thighLeftBack);
        
        // 右大腿後 (深綠)
        const thighRightBack = createPart(new THREE.CylinderGeometry(0.3, 0.25, 1.0, 8), 0x33aa33, [0.5, -0.1, -0.15], [0, 0, 0.05]);
        scene.add(thighRightBack); bodyParts.set('thigh_right_back', thighRightBack);
        
        // 左小腿前 (天藍)
        const legLeftFront = createPart(new THREE.CylinderGeometry(0.22, 0.18, 0.9, 6), 0x88ddff, [-0.5, -0.7, 0.05], [0, 0, 0.0]);
        scene.add(legLeftFront); bodyParts.set('leg_left_front', legLeftFront);
        
        // 右小腿前 (天藍)
        const legRightFront = createPart(new THREE.CylinderGeometry(0.22, 0.18, 0.9, 6), 0x88ddff, [0.5, -0.7, 0.05], [0, 0, 0.0]);
        scene.add(legRightFront); bodyParts.set('leg_right_front', legRightFront);
        
        // 左小腿後 (深藍)
        const legLeftBack = createPart(new THREE.CylinderGeometry(0.24, 0.2, 0.9, 6), 0x3366cc, [-0.5, -0.7, -0.1], [0, 0, 0.0]);
        scene.add(legLeftBack); bodyParts.set('leg_left_back', legLeftBack);
        
        // 右小腿後 (深藍)
        const legRightBack = createPart(new THREE.CylinderGeometry(0.24, 0.2, 0.9, 6), 0x3366cc, [0.5, -0.7, -0.1], [0, 0, 0.0]);
        scene.add(legRightBack); bodyParts.set('leg_right_back', legRightBack);
        
        // 左足 (灰色)
        const footLeft = createPart(new THREE.BoxGeometry(0.3, 0.15, 0.6), 0xaaaaaa, [-0.5, -1.25, 0.15], [0, 0.2, 0]);
        scene.add(footLeft); bodyParts.set('foot_left', footLeft);
        
        // 右足 (灰色)
        const footRight = createPart(new THREE.BoxGeometry(0.3, 0.15, 0.6), 0xaaaaaa, [0.5, -1.25, 0.15], [0, -0.2, 0]);
        scene.add(footRight); bodyParts.set('foot_right', footRight);

        // 儲存原始顏色
        bodyParts.forEach((mesh, key) => {
            originalColors.set(key, mesh.material.color.clone());
        });

        console.log('人體模型已加入，部件數量：', bodyParts.size);

        // 加入CSS2D標籤 (主要肌肉)
        function createLabel(text, position, color = '#f97316') {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = 'white';
            div.style.fontSize = '14px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 2px black';
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.padding = '2px 8px';
            div.style.borderRadius = '12px';
            div.style.border = `1px solid ${color}`;
            div.style.whiteSpace = 'nowrap';
            const label = new CSS2DObject(div);
            label.position.set(position[0], position[1], position[2]);
            scene.add(label);
        }

        createLabel('胸大肌', [0.8, 1.3, 0.4]);
        createLabel('腹直肌', [0.6, 0.8, 0.5]);
        createLabel('三角肌', [1.1, 1.6, 0.2]);
        createLabel('肱二頭肌', [1.2, 1.0, 0.3]);
        createLabel('股四頭肌', [0.8, -0.2, 0.4]);
        createLabel('腓腸肌', [0.7, -0.8, 0.2]);

        // ----- 肌肉映射 (簡化版本，但涵蓋大部分) -----
        const muscleMappings = new Map();
        function mapMany(names, partKey) {
            names.forEach(name => muscleMappings.set(name, partKey));
        }

        // 頭部肌肉 -> head
        mapMany(["枕額肌－額腹","枕額肌－枕腹","前耳肌","上耳肌","後耳肌","眼輪匝肌","皺眉肌","降眉肌","鼻肌－橫部","鼻肌－翼部","鼻中隔下降肌","提上唇鼻翼肌","口輪匝肌","頰肌","顴大肌","顴小肌","提上唇肌","提口角肌","笑肌","降口角肌","降下唇肌","頦肌","咬肌","顳肌","內翼肌","外翼肌","上直肌","下直肌","內直肌","外直肌","上斜肌","下斜肌","提上瞼肌","頦舌肌","舌骨舌肌","莖突舌肌","顎舌肌","上縱舌肌","下縱舌肌","橫舌肌","垂直舌肌"], 'head');
        // 頸部 -> neck
        mapMany(["頸闊肌","胸鎖乳突肌","二腹肌","莖突舌骨肌","下顎舌骨肌","頦舌骨肌","胸骨舌骨肌","肩胛舌骨肌","胸骨甲狀肌","甲狀舌骨肌","頸長肌","頭長肌","前直肌","外側直肌","前斜角肌","中斜角肌","後斜角肌","最小斜角肌","頭後大直肌","頭後小直肌","上斜肌","下斜肌","上咽縮肌","中咽縮肌","下咽縮肌","莖突咽肌","顎咽肌","耳咽肌","環甲肌","後環杓肌","外側環杓肌","橫杓肌","斜杓肌","甲杓肌","聲帶肌"], 'neck');
        // 背部 -> back

                <div class="action-title">7️⃣ 膝屈曲</div>
                <div class="mb-2"><span class="badge-okc">開鏈（坐姿屈膝）</span> <span class="font-semibold">主動肌：</span>股二頭肌、半腱肌、半膜肌； <span class="font-semibold">協同肌：</span>腓腸肌； <span class="font-semibold">拮抗肌：</span>股四頭肌</div>
                <div class="mb-2"><span class="badge-ckc">閉鏈（深蹲下段）</span> <span class="font-semibold">主動肌：</span>股四頭肌（離心）、臀大肌； <span class="font-semibold">穩定肌：</span>臀中肌、內收肌群</div>
            </div>
            <div class="action-block">
                <div class="action-title">8️⃣ 踝背屈</div>
                <div class="mb-2"><span class="badge-okc">開鏈（勾腳）</span> <span class="font-semibold">主動肌：</span>脛前肌； <span class="font-semibold">協同肌：</span>趾長伸肌； <span class="font-semibold">拮抗肌：</span>腓腸肌、比目魚肌</div>
                <div class="mb-2"><span class="badge-ckc">閉鏈（牆測試/深蹲）</span> <span class="font-semibold">主動肌：</span>脛前肌（離心）、比目魚肌（控制）； <span class="font-semibold">穩定肌：</span>足底內在肌、腓骨長肌； <span class="font-semibold">代償：</span>足外旋、膝內扣、足弓塌陷</div>
            </div>
        `;
        kinesiologyContainer.innerHTML = kinesHTML;

        // 動畫循環
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 啟用 autoRotate
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            const newWidth = container.clientWidth;
            const newHeight = container.clientHeight;
            camera.aspect = newWidth / newHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(newWidth, newHeight);
            labelRenderer.setSize(newWidth, newHeight);
        }

        // 預設高亮胸大肌
        setTimeout(() => {
            highlightBodyPart('胸大肌');
            const item = Array.from(document.querySelectorAll('.muscle-item')).find(el => el.dataset.muscle === '胸大肌');
            if(item) {
                item.classList.add('selected', 'bg-[#1e3a5f]', 'border-l-4', 'border-orange-400');
                document.getElementById('selected-muscle-name').classList.remove('hidden');
                document.getElementById('selected-muscle-text').innerText = '胸大肌';
            }
        }, 2000);
    </script>
</body>
</html>
